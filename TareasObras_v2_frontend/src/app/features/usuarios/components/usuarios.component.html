<div class="space-y-5 animate-fade-in">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-50">
        Usuarios
      </h1>
      <p class="text-surface-500 dark:text-surface-400 text-sm mt-0.5">
        Gestión de accesos y roles
      </p>
    </div>
    <p-button
      label="Nuevo Usuario"
      icon="pi pi-user-plus"
      size="small"
      (onClick)="openNew()"
    />
  </div>

  <div
    class="bg-white dark:bg-surface-900 rounded-xl border border-surface-200 dark:border-surface-700 overflow-hidden"
  >
    <p-table
      [value]="usuarios()"
      [loading]="loading()"
      styleClass="p-datatable-sm"
      [paginator]="true" [rows]="20" [rowsPerPageOptions]="[20, 50, 100]" [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords}"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Alta</th>
          <th class="text-center" style="width: 120px">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-u>
        <tr>
          <td class="font-medium text-surface-900 dark:text-surface-100">
            {{ u.nombre }} {{ u.apellidos }}
          </td>
          <td class="text-surface-500 dark:text-surface-400 text-sm">
            {{ u.email }}
          </td>
          <td>
            <span
              [class]="
                'px-2 py-0.5 rounded-full text-xs font-medium ' + rolBadge(u.rol)
              "
              >{{ u.rol }}</span
            >
          </td>
          <td>
            <span
              [class]="
                'px-2 py-0.5 rounded-full text-xs font-medium ' +
                (u.activo
                  ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
                  : 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300')
              "
            >
              {{ u.activo ? "Activo" : "Inactivo" }}
            </span>
          </td>
          <td class="text-sm text-surface-400">
            {{ u.createdAt | date: "dd/MM/yyyy" }}
          </td>
          <td class="text-center">
            <div class="flex items-center justify-center gap-1">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="info"
                size="small"
                pTooltip="Editar"
                (onClick)="openEdit(u)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                size="small"
                pTooltip="Eliminar"
                (onClick)="confirmDelete(u)"
                [disabled]="!u.activo"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center py-10 text-surface-400">
            <i class="pi pi-users text-3xl block mb-2"></i>No hay usuarios
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Dialog crear / editar usuario -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="editMode ? 'Editar Usuario' : 'Nuevo Usuario'"
  [modal]="true"
  [style]="{ width: '480px' }"
  [draggable]="false"
>
  <form [formGroup]="form" class="space-y-4 pt-2">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label
          class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5"
          >Nombre *</label
        >
        <input pInputText formControlName="nombre" class="w-full" />
      </div>
      <div>
        <label
          class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5"
          >Apellidos *</label
        >
        <input pInputText formControlName="apellidos" class="w-full" />
      </div>
    </div>
    <div>
      <label
        class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5"
        >Email *</label
      >
      <input pInputText formControlName="email" type="email" class="w-full" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label
          class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5"
          >{{ editMode ? 'Nueva Contraseña (dejar vacío para no cambiar)' : 'Contraseña *' }}</label
        >
        <p-password
          formControlName="password"
          [feedback]="true"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
      <div>
        <label
          class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1.5"
          >Rol *</label
        >
        <p-select
          formControlName="rol"
          appendTo="body"
          [options]="rolOptions"
          optionLabel="label"
          optionValue="value"
          styleClass="w-full"
          placeholder="Selecciona rol"
        />
      </div>
    </div>
    @if (editMode) {
      <div class="flex items-center gap-3">
        <p-toggleSwitch formControlName="activo" />
        <label class="text-sm font-medium text-surface-700 dark:text-surface-300">
          Usuario activo
        </label>
      </div>
    }
  </form>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      severity="secondary"
      [outlined]="true"
      (onClick)="dialogVisible = false"
    />
    <p-button
      [label]="editMode ? 'Guardar Cambios' : 'Crear Usuario'"
      icon="pi pi-check"
      (onClick)="guardar()"
      [disabled]="form.invalid"
      [loading]="saving()"
    />
  </ng-template>
</p-dialog>

<!-- Confirm dialog para eliminar -->
<p-confirmDialog />
